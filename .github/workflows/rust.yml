name: Rust

on:
  push:
    branches: [main]
    tags:
      - "mdi/v*"
      - "octicons/v*"
      - "fontawesome/v*"
      - "simple-icons/v*"
    paths:
      - crates/**
      - .github/workflows/rust.yml
      - "!crates/*/deno.json"
      - "!crates/*/main.ts"
      - "!crates/*/pyproject.toml"
      - Cargo.toml
  pull_request:
    branches: [main]
    paths:
      - crates/**
      - .github/workflows/rust.yml
      - "!crates/*/deno.json"
      - "!crates/*/main.ts"
      - "!crates/*/pyproject.toml"
      - Cargo.toml

permissions: {}

jobs:
  get-changed-crates:
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.matrix.outputs.crates }}
      cargo-packages: ${{ steps.matrix.outputs.cargo-packages }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/dyn-ci-matrix
        id: matrix
        with:
          nushell-version: ${{ vars.NU_SHELL_VERSION || '*' }}

  lint:
    name: Lint ${{ needs.get-changed-crates.outputs.crates }}
    runs-on: ubuntu-latest
    needs: [get-changed-crates]
    if: needs.get-changed-crates.outputs.cargo-packages != ''
    env:
      PACKAGES: ${{ needs.get-changed-crates.outputs.cargo-packages }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Cache cargo artifacts
        uses: actions/cache@v5.0.5 # zizmor: ignore[cache-poisoning]
        with:
          path: "~/.cargo"
          key: cargo-lint-${{ hashFiles('Cargo.lock') }}
      - run: cargo clippy ${PACKAGES} -- -D warnings
      - run: cargo fmt --check ${PACKAGES}

  doc:
    needs: [get-changed-crates]
    if: needs.get-changed-crates.outputs.crates != '[]'
    name: Docs ${{ needs.get-changed-crates.outputs.crates }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: rustup update --no-self-update
      - name: Cache cargo artifacts
        uses: actions/cache@v5.0.5 # zizmor: ignore[cache-poisoning]
        with:
          path: "~/.cargo"
          key: cargo-doc-${{ hashFiles('Cargo.lock') }}
      - env:
          PACKAGES: ${{ needs.get-changed-crates.outputs.cargo-packages }}
        run: cargo doc --no-deps ${PACKAGES}
      - name: Upload docs as artifact
        uses: actions/upload-artifact@v7
        with:
          path: target/doc
          name: rust-docs

  test:
    needs: [get-changed-crates]
    if: needs.get-changed-crates.outputs.crates != '[]'
    name: Test ${{ needs.get-changed-crates.outputs.crates }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: rustup update --no-self-update
      - name: Cache cargo artifacts
        uses: actions/cache@v5.0.5 # zizmor: ignore[cache-poisoning]
        with:
          path: "~/.cargo"
          key: cargo-test-${{ hashFiles('Cargo.lock') }}
      - env:
          PACKAGES: ${{ needs.get-changed-crates.outputs.cargo-packages }}
        run: cargo test ${PACKAGES}

  release:
    needs: [lint, doc, test, get-changed-crates]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: release
    strategy:
      matrix:
        pkg: ${{ fromJson(needs.get-changed-crates.outputs.crates) }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: rustup update --no-self-update
      - name: Setup nushell
        uses: hustcer/setup-nu@92c296ba1ba2ba04cc948ab64ddefe192dc13f0c # v3.23
        with:
          version: ${{ vars.NU_SHELL_VERSION || '*' }}
      - name: Get package name
        id: translate
        shell: nu {0}
        env:
          CRATE_DIR: ${{ matrix.pkg }}
        run: |-
          let name = (
            open $"${{ github.workspace }}/crates/($env.CRATE_DIR)/Cargo.toml"
            | get package
            | get name
          )
          $"pkg=($name)\n" | save --append $env.GITHUB_OUTPUT
      - name: Establish provenance
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        if: startsWith(github.ref, 'refs/tags/') && startsWith(github.ref_name, matrix.pkg)
        id: auth
      - name: Publish crate ${{ steps.translate.outputs.pkg }}
        if: startsWith(github.ref, 'refs/tags/') && startsWith(github.ref_name, matrix.pkg)
        env:
          PKG_NAME: ${{ steps.translate.outputs.pkg }}
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p $PKG_NAME

  check-dist:
    needs: [lint, doc, test, get-changed-crates]
    if: needs.get-changed-crates.outputs.crates != '[]' && !startsWith(github.ref, 'refs/tags/')
    name: Check package dist ${{ needs.get-changed-crates.outputs.crates }}
    strategy:
      matrix:
        pkg: ${{ fromJson(needs.get-changed-crates.outputs.crates) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: rustup update --no-self-update
      - name: Setup nushell
        uses: hustcer/setup-nu@92c296ba1ba2ba04cc948ab64ddefe192dc13f0c # v3.23
        with:
          version: ${{ vars.NU_SHELL_VERSION || '*' }}
      - name: Get package name
        id: translate
        shell: nu {0}
        env:
          CRATE_DIR: ${{ matrix.pkg }}
        run: |-
          let name = (
            open $"${{ github.workspace }}/crates/($env.CRATE_DIR)/Cargo.toml"
            | get package
            | get name
          )
          $"pkg=($name)\n" | save --append $env.GITHUB_OUTPUT
      - name: Package crate ${{ steps.translate.outputs.pkg }} (dry run)
        env:
          PKG_NAME: ${{ steps.translate.outputs.pkg }}
        run: cargo publish -p $PKG_NAME --dry-run # zizmor: ignore[use-trusted-publishing]
